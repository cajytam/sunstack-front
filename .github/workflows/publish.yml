name: Créer et publier l'image Docker

on:
  push:
    branches:
      - production
      # - beta

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    outputs:
      docker_tag: ${{ steps.determine-tag.outputs.docker_tag }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Determine Docker tag
        id: determine-tag
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/beta" ]]; then
            echo "docker_tag=beta" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == "refs/heads/production" ]]; then
            echo "docker_tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "docker_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build the Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          file: ./.docker/Dockerfile
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.determine-tag.outputs.docker_tag }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push-image
    steps:
      - name: Deploy to VPS over SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          DOCKER_TAG: ${{ needs.build-and-push-image.outputs.docker_tag }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          envs: REGISTRY,IMAGE_NAME,DOCKER_TAG
          script: |
            docker compose down frontend
            docker rmi ${REGISTRY}/${IMAGE_NAME}:${DOCKER_TAG} || true
            docker compose up -d > /dev/null 2>&1
