name: Créer et publier l'image Docker

on:
  push:
    branches:
      - production
      # - beta

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Determine Docker tag
        id: determine-tag
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/beta" ]]; then
            echo "docker-tag=beta" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF}" == "refs/heads/production" ]]; then
            echo "docker-tag=latest" >> $GITHUB_ENV
          fi

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build the Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          file: ./.docker/Dockerfile
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.docker-tag }}

    deploy:
        runs-on: ubuntu-latest
        needs: build-and-push-image
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Deploy to VPS over SSH
              uses: appleboy/ssh-action@v1.2.5
              env:
                  REGISTRY: ${{ env.REGISTRY }}
                  IMAGE_NAME: ${{ env.IMAGE_NAME }}
                  DOCKER_TAG: ${{ needs.build-and-push-image.outputs.docker-tag }}
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USERNAME }}
                  password: ${{ secrets.VPS_PASSWORD }}
                  port: ${{ secrets.VPS_PORT }}
                  envs: REGISTRY,IMAGE_NAME,DOCKER_TAG
                  script: |
                      docker compose stop front
                      docker rmi ${REGISTRY}/${IMAGE_NAME}:${DOCKER_TAG} || true
                      docker compose up -d
